<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Videoarchive · Guillotine Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="videoarchive-page">
   <header class="videoarchive-topbar">
     <div class="topbar-left">filmarchive</div>
     <div class="topbar-right">
       <a href="list-of-titles.html" class="videoarchive-link">list of titles</a>
     </div>
   </header>

  <main class="videoarchive-main" role="main">
    <section class="videoarchive-hero">
      <div class="videoarchive-watch-label">watch now!</div>

      <figure class="videoarchive-figure">
        <div class="video-container">
          <video id="myVideo" poster="images/videoarchive/lastdance_thumb.png" controls>
            <source src="images/videoarchive/lastdance_video.mp4" type="video/mp4" />
          </video>
        </div>
      </figure>

      <p class="videoarchive-description">
        Last Dance of Bas Jan Ader is a digitized compilation of recovered Super 8 footage shot at sea,
        provisionally linked to Ader’s final period after his 1975 disappearance during his expedition
        for <em>In Search of the Miraculous</em>.
      </p>
    </section>
  </main>
  
</body>

</html>
